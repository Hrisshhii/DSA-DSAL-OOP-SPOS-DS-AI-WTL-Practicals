<!DOCTYPE html>
<html ng-app="authApp">
<head>
    <title>AngularJS Auth App</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body ng-controller="AuthController">
    <div class="container">
        <h2>AngularJS Auth System</h2>

        <!-- Toggle -->
        <div class="toggle">
            <button ng-click="showRegister()" ng-class="{active:isRegister}">Register</button>
            <button ng-click="showLogin()" ng-class="{active:isLogin}">Login</button>
        </div>

        <!-- REGISTER -->
        <div class="card" ng-show="isRegister">
            <h3>Create Account</h3>
            <form ng-submit="register()">
                <input type="text" ng-model="user.firstName" placeholder="First Name" required>
                <input type="text" ng-model="user.lastName" placeholder="Last Name" required>
                <input type="text" ng-model="user.username" placeholder="Username" required>
                <input type="password" ng-model="user.password" placeholder="Password" required>
                <button type="submit" class="primary">Register</button>
            </form>
            <p class="success">{{regMessage}}</p>
        </div>

        <!-- LOGIN -->
        <div class="card" ng-show="isLogin && !isLoggedIn">
            <h3>Login</h3>
            <form ng-submit="login()">
                <input type="text" ng-model="loginData.username" placeholder="Username" required>
                <input type="password" ng-model="loginData.password" placeholder="Password" required>
                <button type="submit" class="primary">Login</button>
            </form>
            <p class="error">{{loginMessage}}</p>
        </div>

        <!-- DASHBOARD -->
        <div class="card" ng-show="isLoggedIn">
            <h3>Welcome, {{currentUser.username}} 👋</h3>
            <p>Name: {{currentUser.firstName}} {{currentUser.lastName}}</p>
            <button class="logout" ng-click="logout()">Logout</button>
        </div>
    </div>
</body>
<script src="app.js"></script>
</html>
